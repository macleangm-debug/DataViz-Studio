<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- DataViz Studio Logo - Light version for report covers -->
  <!-- Transparent background, white/light strokes for gradient backgrounds -->
  
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="38" stroke="rgba(255,255,255,0.9)" stroke-width="3" fill="none"/>
  
  <!-- Inner ring -->
  <circle cx="50" cy="50" r="26" stroke="rgba(255,255,255,0.7)" stroke-width="2.5" fill="none"/>
  
  <!-- Center dot -->
  <circle cx="50" cy="50" r="8" fill="rgba(255,255,255,0.95)"/>
  
  <!-- Crosshairs -->
  <line x1="50" y1="8" x2="50" y2="22" stroke="rgba(255,255,255,0.8)" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="78" x2="50" y2="92" stroke="rgba(255,255,255,0.8)" stroke-width="3" stroke-linecap="round"/>
  <line x1="8" y1="50" x2="22" y2="50" stroke="rgba(255,255,255,0.8)" stroke-width="3" stroke-linecap="round"/>
  <line x1="78" y1="50" x2="92" y2="50" stroke="rgba(255,255,255,0.8)" stroke-width="3" stroke-linecap="round"/>
</svg>
